{% extends "base.html" %}

{% block title %}Admin — Lobotomy{% endblock %}

{% block styles %}
<link rel="stylesheet" href="/static/css/components/modal.css">
<link rel="stylesheet" href="/static/css/pages/admin.css">
{% endblock %}

{% block content %}

<div class="admin-page">

    <div class="admin-page__top">
        <h1 class="admin-page__title">Каталог — управление</h1>
        <button class="btn btn--dark" id="btn-add">+ Добавить изделие</button>
    </div>

    <div class="admin-filters" id="filter-tabs"></div>

    <div class="admin-list" id="product-list">
        <p class="admin-empty">Загрузка...</p>
    </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">

        <div class="modal__header">
            <span class="modal__title" id="modal-title">Добавить изделие</span>
            <button class="modal__close" id="modal-close" aria-label="Закрыть">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                    <path d="M2 2L16 16M16 2L2 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </button>
        </div>

        <form class="modal__form" id="product-form" novalidate>

            <div class="modal__field">
                <label class="modal__label" for="field-collection">Коллекция</label>
                <select class="modal__select" id="field-collection" required></select>
            </div>

            <div class="modal__field">
                <label class="modal__label" for="field-name">Название *</label>
                <input class="modal__input" type="text" id="field-name" placeholder="Рубашка оверсайз" required>
            </div>

            <div class="modal__field">
                <label class="modal__label" for="field-description">Описание</label>
                <textarea class="modal__textarea" id="field-description" placeholder="Свободный крой, хлопок..."></textarea>
            </div>

            <div class="modal__row">
                <div class="modal__field">
                    <label class="modal__label" for="field-material">Материал</label>
                    <input class="modal__input" type="text" id="field-material" placeholder="Хлопок">
                </div>
                <div class="modal__field">
                    <label class="modal__label" for="field-density">Плотность, г/м²</label>
                    <input class="modal__input" type="number" id="field-density" placeholder="180" min="1">
                </div>
            </div>

            <div class="modal__field">
                <label class="modal__label" for="field-price">Стоимость, ₽ *</label>
                <input class="modal__input" type="number" id="field-price" placeholder="5000" min="1" required>
            </div>

            <div class="modal__field">
                <label class="modal__label" for="field-images">Изображения</label>
                <textarea class="modal__textarea" id="field-images" placeholder="front.jpg&#10;back.jpg&#10;detail.jpg"></textarea>
            </div>

            <div class="modal__actions">
                <button class="btn btn--dark" type="submit" id="btn-submit">Сохранить</button>
                <button class="btn btn--outline" type="button" id="btn-cancel">Отмена</button>
            </div>

        </form>
    </div>
</div>

{% endblock %}

{% block scripts %}
{{ super() }}
<script src="/static/js/pages/admin.js"></script>
{% endblock %}
