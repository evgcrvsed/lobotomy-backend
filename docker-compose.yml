services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lobotomy
    ports:
      # Только локальный доступ — чтобы на сервере Postgres не торчал наружу
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 15

  app:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/lobotomy
    depends_on:
      db:
        condition: service_healthy

  web:
    # Путь до репозитория фронтенда (клонировать рядом с этим репозиторием).
    # Локально можно переопределить в .env: FRONTEND_DIR=<путь>
    build:
      context: ${FRONTEND_DIR:-../lobotomy-frontend}
    ports:
      - "80:80"
    depends_on:
      - app

volumes:
  postgres_data:
