# Фиксируем имя проекта, чтобы оно не зависело от папки, из которой запущен compose
name: lobotomy

services:
  db:
    container_name: lobotomy-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lobotomy
    ports:
      # Только локальный доступ — чтобы на сервере Postgres не торчал наружу
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 15

  backend:
    container_name: lobotomy-backend
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/lobotomy
      # Авторизация: задаются в .env рядом с компоузом
      VK_CLIENT_ID: ${VK_CLIENT_ID:-}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
    volumes:
      # Загруженные через админку фото должны переживать пересборку контейнера
      - static_images:/app/static/images
      # Оригиналы, отложенные скриптом сжатия
      - static_originals:/app/static/originals
    depends_on:
      db:
        condition: service_healthy

  frontend:
    container_name: lobotomy-frontend
    restart: unless-stopped
    # Путь до репозитория фронтенда (клонировать рядом с этим репозиторием).
    # Локально можно переопределить в .env: FRONTEND_DIR=<путь>
    build:
      context: ${FRONTEND_DIR:-../lobotomy-frontend}
      args:
        # ID приложения VK ID — вшивается во фронтенд при сборке
        VITE_VK_APP_ID: ${VITE_VK_APP_ID:-}
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  static_images:
  static_originals:
