# Фиксируем имя проекта, чтобы оно не зависело от папки, из которой запущен compose
name: lobotomy

services:
  db:
    container_name: lobotomy-db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lobotomy
    ports:
      # Только локальный доступ — чтобы на сервере Postgres не торчал наружу
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 15

  backend:
    container_name: lobotomy-backend
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/lobotomy
    volumes:
      # Загруженные через админку фото должны переживать пересборку контейнера
      - static_images:/app/static/images
    depends_on:
      db:
        condition: service_healthy

  frontend:
    container_name: lobotomy-frontend
    # Путь до репозитория фронтенда (клонировать рядом с этим репозиторием).
    # Локально можно переопределить в .env: FRONTEND_DIR=<путь>
    build:
      context: ${FRONTEND_DIR:-../lobotomy-frontend}
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  static_images:
